name: Build & Release

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25 (Microsoft OpenJDK)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn package -q --no-transfer-progress

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: superhard-jar
          path: target/superhard-*.jar
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build
        run: mvn package -q --no-transfer-progress

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/superhard-*.jar
          name: SuperHard ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## SuperHard ${{ steps.version.outputs.VERSION }}

            Paper **26.1.2** (build 53+) 向け Hard SMP チャレンジプラグイン。

            ### インストール
            `superhard-*.jar` を `plugins/` に配置して再起動。

            ### 要件
            - Paper 26.1.2 build 53 以降
            - Java 21+
            - AuraSkills (任意)

            ### ライセンス
            Unlicense (Public Domain)
